# 静态默认数据（供模板使用；config 中的 [data] 会覆盖此处）
# 文件名须为 .chezmoidata.toml（chezmoi 特殊文件约定），不得改为 .tmpl。
# 详见 .chezmoi/chezmoi.toml 的 [data]
proxy = "http://127.0.0.1:7890"
proxy_host = "127.0.0.1"
proxy_port = "7890"
git_user_name = ""
git_user_email = ""
# Windows 下 Git Bash 路径（用于 Windows Terminal profile；若 Git 安装在其他盘符请在 .chezmoi.toml.local 中覆盖）
windows_git_bash_path = "C:/Program Files/Git/bin/bash.exe"
# Windows 下 Git for Windows 图标路径
windows_git_icon_path = "C:/Program Files/Git/mingw64/share/git/git-for-windows.ico"
windows_git_connect_path = "C:/Program Files/Git/mingw64/bin/connect.exe"
macos_connect_path = "/opt/homebrew/bin/connect"
macos_proxy_connect_opt = "-S"
macos_zsh_path = "/opt/homebrew/bin/zsh"
identity_file = "~/.ssh/id_rsa"
# Cursor Remote SSH：见 agent-config config/local.env.example
